name: CI/CD Pipeline

on:
  push:
    branches: [main, feature]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------
  # Stage 1: Build & Test
  # ---------------------------------------------------------------
  build:
    name: 1. Build & Test
    runs-on: ubuntu-latest
    outputs:
      build-status: ${{ steps.build-step.outcome }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and run tests
        id: build-step
        run: mvn -B clean verify

      - name: Upload build artifact (JAR)
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/ecommerce-api.jar
          retention-days: 14

  # ---------------------------------------------------------------
  # Stage 2: Security Scanning + Claude Agent #1
  # ---------------------------------------------------------------
  security-scan:
    name: 2. Security Scanning
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: OWASP Dependency-Check (SCA)
        run: mvn -B org.owasp:dependency-check-maven:check
        continue-on-error: true

      - name: Trivy filesystem scan (SAST/secrets/deps)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-fs-report.json
          severity: CRITICAL,HIGH,MEDIUM
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Claude Security Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/agents/security_agent.py

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: agent-reports/security-report.md

  # ---------------------------------------------------------------
  # Stage 3: Package (re-download build artifact for image build)
  # ---------------------------------------------------------------
  # (Folded into docker-build stage below for simplicity)

  # ---------------------------------------------------------------
  # Stage 4: Docker Build, Publish to GHCR + Claude Agent #2
  # ---------------------------------------------------------------
  docker-build:
    name: 3. Docker Build & Publish
    runs-on: ubuntu-latest
    needs: security-scan
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "image-tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ${{ steps.meta.outputs.image-tag }} -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.meta.outputs.image-tag }}
          format: json
          output: trivy-image-report.json
          severity: CRITICAL,HIGH,MEDIUM
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Claude Docker Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          IMAGE_TAG: ${{ steps.meta.outputs.image-tag }}
        run: python scripts/agents/docker_agent.py

      - name: Upload docker report
        uses: actions/upload-artifact@v4
        with:
          name: docker-report
          path: agent-reports/docker-report.md

      - name: Push image to GHCR
        run: |
          docker push ${{ steps.meta.outputs.image-tag }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # ---------------------------------------------------------------
  # Stage 5: Deploy (simulated, no Kubernetes) + Claude Agent #3
  # ---------------------------------------------------------------
  deploy:
    name: 4. Deploy (Simulated)
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate deploy step
        id: deploy-step
        run: |
          echo "Simulating deployment of ${{ needs.docker-build.outputs.image-tag }} to staging environment..." | tee deploy-log.txt
          echo "Pulling image from GHCR..." | tee -a deploy-log.txt
          echo "Starting container on port 8080..." | tee -a deploy-log.txt
          echo "Running health check against /actuator/health..." | tee -a deploy-log.txt
          echo "Deployment simulation completed successfully." | tee -a deploy-log.txt
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Claude Deploy Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEPLOY_STATUS: ${{ steps.deploy-step.outcome }}
          DEPLOY_ENV: "staging (simulated)"
          IMAGE_TAG: ${{ needs.docker-build.outputs.image-tag }}
        run: python scripts/agents/deploy_agent.py

      - name: Upload deploy report
        uses: actions/upload-artifact@v4
        with:
          name: deploy-report
          path: agent-reports/deploy-report.md

  # ---------------------------------------------------------------
  # Final: Aggregate all 3 agent reports into one comprehensive report
  # ---------------------------------------------------------------
  final-report:
    name: 5. Comprehensive Report
    runs-on: ubuntu-latest
    needs: [build, security-scan, docker-build, deploy]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all agent reports
        uses: actions/download-artifact@v4
        with:
          path: agent-reports
          pattern: '*-report'
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate final comprehensive report
        env:
          BUILD_STATUS: ${{ needs.build.result }}
        run: python scripts/agents/generate_final_report.py

      - name: Upload final comprehensive report
        uses: actions/upload-artifact@v4
        with:
          name: final-pipeline-report
          path: agent-reports/FINAL_PIPELINE_REPORT.md
